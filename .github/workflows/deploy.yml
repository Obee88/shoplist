name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shoplist:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stop shoplist || true
            docker rm shoplist || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/shoplist:latest
            docker run -d \
              --name shoplist \
              --net ${{ secrets.DOCKER_NETWORK }} \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e MONGODB_URI=${{ secrets.MONGODB_URI }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/shoplist:latest
            docker image prune -f
